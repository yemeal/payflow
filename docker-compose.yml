services:

  # --- PostgreSQL for Payment Service---
  payment-service.postgres:
    image: postgres:17-bookworm
    container_name: payment-service.postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PAYMENT_DB_USER}
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD}
      POSTGRES_DB: ${PAYMENT_DB_NAME}
    ports:
      - "${PAYMENT_DB_PORT}:5432"
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENT_DB_USER} -d ${PAYMENT_DB_NAME}"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5

  # --- PostgreSQL for Analytics Service---
  analytics-service.postgres:
    image: postgres:17-bookworm
    container_name: analytics-service.postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ANALYTICS_DB_USER}
      POSTGRES_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      POSTGRES_DB: ${ANALYTICS_DB_NAME}
    ports:
      - "${ANALYTICS_DB_PORT}:5432"
    volumes:
      - analytics_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ANALYTICS_DB_USER} -d ${ANALYTICS_DB_NAME}"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5

  # --- Redis per Service (решение 2026-07-15): у каждого сервиса свой инстанс ---
  payment-service.redis:
    image: redis:7-bookworm
    container_name: payment-service.redis
    restart: unless-stopped
    ports:
      - "${PAYMENT_REDIS_PORT}:6379"
    volumes:
      - payment_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 5

  analytics-service.redis:
    image: redis:7-bookworm
    container_name: analytics-service.redis
    restart: unless-stopped
    ports:
      - "${ANALYTICS_REDIS_PORT}:6379"
    volumes:
      - analytics_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 5

  order-service.redis:
    image: redis:7-bookworm
    container_name: order-service.redis
    restart: unless-stopped
    ports:
      - "${ORDER_REDIS_PORT}:6379"
    volumes:
      - order_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 5

  auth-service.redis:
    image: redis:7-bookworm
    container_name: auth-service.redis
    restart: unless-stopped
    # idempotency cache на несколько минут хранит готовую TokenPair, поэтому
    # этот Redis оставляем in-memory и не сбрасываем refresh-токены на диск
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${AUTH_REDIS_PORT:-6382}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 5

  # --- Kafka (KRaft mode) ---
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    restart: unless-stopped
    environment:
      # KRaft
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Listeners
      # PLAINTEXT   для сервисов внутри docker network
      # CONTROLLER  для внутреннего KRaft-протокола
      # EXTERNAL    для доступа с хоста (localhost:9092)
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Топики
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # Storage
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "PayFlowLocalDevCluster01"
    ports:
      - "9092:9092"     # для доступа с хоста
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:29092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  # --- Kafka UI ---
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "9099:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "PayFlowLocal"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:29092"
    depends_on:
      kafka:
        condition: service_healthy

  # --- Payment Service API Worker ---
  payment-service.http-api-worker:
    build:
      context: ./payment_service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-develop}
    container_name: payment-service.http-api-worker
    restart: unless-stopped
    env_file:
      - ./payment_service/.env
    environment:
      # переопределяем хосты - внутри docker network используем имена сервисов
      DATABASE_HOST: payment-service.postgres
      DATABASE_PORT: 5432
      REDIS_HOST: payment-service.redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PAYMENT_PROVIDER_URL: http://payment-provider-mock:8010
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/ready')"]
      interval: 180s
      timeout: 5s
      start_period: 30s
      retries: 5
    depends_on:
      payment-service.postgres:
        condition: service_healthy
      payment-service.redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      payment-provider-mock.http-api-worker:
        condition: service_healthy

  # --- Payment Provider Mock ---
  payment-provider-mock.http-api-worker:
    build:
      context: ./payment_provider_mock
      dockerfile: Dockerfile
    container_name: payment-provider-mock.http-api-worker
    networks:
      default:
        aliases:
          # прежний hostname: на него ссылаются PAYMENT_PROVIDER_URL пяти контейнеров
          - payment-provider-mock
    restart: unless-stopped
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 180s
      timeout: 5s
      start_period: 30s
      retries: 5

  # --- Payment Service Events Producer ---
  payment-service.message-producer:
    build:
      context: ./payment_service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-develop}
    container_name: payment-service.message-producer
    restart: unless-stopped
    env_file:
      - ./payment_service/.env
    environment:
      DATABASE_HOST: payment-service.postgres
      DATABASE_PORT: 5432
      REDIS_HOST: payment-service.redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PAYMENT_PROVIDER_URL: http://payment-provider-mock:8010
    command: ["python", "-m", "app.entrypoints.messaging.producer"]
    depends_on:
      payment-service.postgres:
        condition: service_healthy
      payment-service.redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # --- Payment Service Events Consumer ---
  payment-service.message-consumer:
    build:
      context: ./payment_service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-develop}
    container_name: payment-service.message-consumer
    restart: unless-stopped
    env_file:
      - ./payment_service/.env
    environment:
      DATABASE_HOST: payment-service.postgres
      DATABASE_PORT: 5432
      REDIS_HOST: payment-service.redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PAYMENT_PROVIDER_URL: http://payment-provider-mock:8010
    command: ["python", "-m", "app.entrypoints.messaging.consumer"]
    depends_on:
      payment-service.postgres:
        condition: service_healthy
      payment-service.redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # --- Payment TaskIQ Worker ---
  payment-service.background-tasks-worker:
    build:
      context: ./payment_service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-develop}
    container_name: payment-service.background-tasks-worker
    restart: unless-stopped
    env_file:
      - ./payment_service/.env
    environment:
      DATABASE_HOST: payment-service.postgres
      DATABASE_PORT: 5432
      REDIS_HOST: payment-service.redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PAYMENT_PROVIDER_URL: http://payment-provider-mock:8010
    command: ["taskiq", "worker", "app.entrypoints.workers.taskiq:broker"]
    depends_on:
      payment-service.postgres:
        condition: service_healthy
      payment-service.redis:
        condition: service_healthy
      payment-provider-mock.http-api-worker:
        condition: service_healthy

  # --- Payment TaskIQ Scheduler ---
  payment-service.background-tasks-scheduler:
    build:
      context: ./payment_service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-develop}
    container_name: payment-service.background-tasks-scheduler
    restart: unless-stopped
    env_file:
      - ./payment_service/.env
    environment:
      DATABASE_HOST: payment-service.postgres
      DATABASE_PORT: 5432
      REDIS_HOST: payment-service.redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PAYMENT_PROVIDER_URL: http://payment-provider-mock:8010
    command: ["taskiq", "scheduler", "app.entrypoints.workers.taskiq:scheduler"]
    depends_on:
      payment-service.redis:
        condition: service_healthy

  # --- Analytics Service ---
  analytics-service:
    build:
      context: ./analytics_service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-develop}
    container_name: payflow-analytics-service
    restart: unless-stopped
    env_file:
      - ./analytics_service/.env
    environment:
      # переопределяем хосты - внутри docker network используем имена сервисов
      DATABASE_HOST: analytics-service.postgres
      DATABASE_PORT: 5432
      REDIS_HOST: analytics-service.redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health/ready')"]
      interval: 180s
      timeout: 5s
      start_period: 30s
      retries: 5
    depends_on:
      analytics-service.postgres:
        condition: service_healthy
      analytics-service.redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # --- PostgreSQL for Auth Service ---
  auth-service.postgres:
    image: postgres:17-bookworm
    container_name: auth-service.postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    ports:
      - "${AUTH_DB_PORT}:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d ${AUTH_DB_NAME}"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5

  # --- PostgreSQL for Order Service ---
  order-service.postgres:
    image: postgres:17-bookworm
    container_name: order-service.postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ORDER_DB_USER}
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
      POSTGRES_DB: ${ORDER_DB_NAME}
    ports:
      - "${ORDER_DB_PORT}:5432"
    volumes:
      - order_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ORDER_DB_USER} -d ${ORDER_DB_NAME}"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5

  # --- PostgreSQL for Saga Orchestrator ---
  orchestrator-service.postgres:
    image: postgres:17-bookworm
    container_name: orchestrator-service.postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ORCHESTRATOR_DB_USER}
      POSTGRES_PASSWORD: ${ORCHESTRATOR_DB_PASSWORD}
      POSTGRES_DB: ${ORCHESTRATOR_DB_NAME}
    ports:
      - "${ORCHESTRATOR_DB_PORT}:5432"
    volumes:
      - orchestrator_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ORCHESTRATOR_DB_USER} -d ${ORCHESTRATOR_DB_NAME}"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5

  # --- PostgreSQL for Inventory Service ---
  inventory-service.postgres:
    image: postgres:17-bookworm
    container_name: inventory-service.postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${INVENTORY_DB_USER}
      POSTGRES_PASSWORD: ${INVENTORY_DB_PASSWORD}
      POSTGRES_DB: ${INVENTORY_DB_NAME}
    ports:
      - "${INVENTORY_DB_PORT}:5432"
    volumes:
      - inventory_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${INVENTORY_DB_USER} -d ${INVENTORY_DB_NAME}"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5

  # --- Auth Service ---
  auth-service.http-api-worker:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-develop}
    container_name: auth-service.http-api-worker
    restart: unless-stopped
    env_file:
      - ./auth_service/.env
    environment:
      # переопределяем хосты - внутри docker network используем имена сервисов
      DATABASE_HOST: auth-service.postgres
      DATABASE_PORT: 5432
      REDIS_HOST: auth-service.redis
      REDIS_PORT: 6379
      JWT_PRIVATE_KEY_PATH: /run/secrets/auth_jwt_private_key
      JWT_PUBLIC_KEY_PATH: /run/configs/auth_jwt_public_key
    secrets:
      - auth_jwt_private_key
    configs:
      - auth_jwt_public_key
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/api/health/ready')"]
      interval: 180s
      timeout: 5s
      start_period: 30s
      retries: 5
    depends_on:
      auth-service.postgres:
        condition: service_healthy
      auth-service.redis:
        condition: service_healthy

  # --- Order Service API ---
  order-service.http-api-worker:
    build:
      context: ./order_service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-develop}
    container_name: order-service.http-api-worker
    restart: unless-stopped
    env_file:
      - ./order_service/.env
    environment:
      DATABASE_HOST: order-service.postgres
      DATABASE_PORT: 5432
      REDIS_HOST: order-service.redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/api/health/ready')"]
      interval: 180s
      timeout: 5s
      start_period: 30s
      retries: 5
    depends_on:
      order-service.postgres:
        condition: service_healthy
      order-service.redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # --- Order Service Events Producer (outbox relay) ---
  order-service.message-producer:
    build:
      context: ./order_service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-develop}
    container_name: order-service.message-producer
    restart: unless-stopped
    env_file:
      - ./order_service/.env
    environment:
      DATABASE_HOST: order-service.postgres
      DATABASE_PORT: 5432
      REDIS_HOST: order-service.redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # миграции гоняет только api-контейнер - без гонки нескольких alembic
      RUN_MIGRATIONS: "false"
    command: ["python", "-m", "app.entrypoints.messaging.relay"]
    depends_on:
      order-service.postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # --- Order Service Saga Consumer ---
  order-service.message-consumer:
    build:
      context: ./order_service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-develop}
    container_name: order-service.message-consumer
    restart: unless-stopped
    env_file:
      - ./order_service/.env
    environment:
      DATABASE_HOST: order-service.postgres
      DATABASE_PORT: 5432
      REDIS_HOST: order-service.redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      RUN_MIGRATIONS: "false"
    command: ["python", "-m", "app.entrypoints.messaging.consumer"]
    depends_on:
      order-service.postgres:
        condition: service_healthy
      order-service.redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # --- Saga Orchestrator: Consumer (гоняет миграции для всего сервиса) ---
  # Один сервис = 4 процесса-энтрипоинта той же сборки: консюмер саги,
  # outbox-relay, retry/deadline-поллер, read-only Admin API. Alembic
  # гоняет ТОЛЬКО консюмер (RUN_MIGRATIONS из .env=true), остальные - false,
  # чтобы не запускать несколько alembic наперегонки.
  orchestrator-service.message-consumer:
    build:
      context: ./orchestrator_service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-develop}
    container_name: orchestrator-service.message-consumer
    restart: unless-stopped
    env_file:
      - ./orchestrator_service/.env
    environment:
      DATABASE_HOST: orchestrator-service.postgres
      DATABASE_PORT: 5432
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    command: ["python", "-m", "app.entrypoints.messaging.consumer"]
    depends_on:
      orchestrator-service.postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # --- Saga Orchestrator: Outbox Relay (outbox -> команды/события) ---
  orchestrator-service.message-producer:
    build:
      context: ./orchestrator_service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-develop}
    container_name: orchestrator-service.message-producer
    restart: unless-stopped
    env_file:
      - ./orchestrator_service/.env
    environment:
      DATABASE_HOST: orchestrator-service.postgres
      DATABASE_PORT: 5432
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      RUN_MIGRATIONS: "false"
    command: ["python", "-m", "app.entrypoints.messaging.relay"]
    depends_on:
      orchestrator-service.postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # --- Saga Orchestrator: Retry/Deadline Poller ---
  orchestrator-service.background-worker:
    build:
      context: ./orchestrator_service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-develop}
    container_name: orchestrator-service.background-worker
    restart: unless-stopped
    env_file:
      - ./orchestrator_service/.env
    environment:
      DATABASE_HOST: orchestrator-service.postgres
      DATABASE_PORT: 5432
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      RUN_MIGRATIONS: "false"
    command: ["python", "-m", "app.entrypoints.messaging.poller"]
    depends_on:
      orchestrator-service.postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # --- Saga Orchestrator: Admin API (read-only, роль admin из JWT) ---
  orchestrator-service.http-api-worker:
    build:
      context: ./orchestrator_service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-develop}
    container_name: orchestrator-service.http-api-worker
    restart: unless-stopped
    env_file:
      - ./orchestrator_service/.env
    environment:
      DATABASE_HOST: orchestrator-service.postgres
      DATABASE_PORT: 5432
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      RUN_MIGRATIONS: "false"
    command: ["uvicorn", "app.entrypoints.http.main:create_app", "--factory", "--host", "0.0.0.0", "--port", "8004"]
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health/ready')"]
      interval: 180s
      timeout: 5s
      start_period: 30s
      retries: 5
    depends_on:
      orchestrator-service.postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # --- DLQ Watcher: следит за всеми <топик>.dlq (regex-подписка) ---
  # единая точка наблюдения за мёртвыми сообщениями всех сервисов
  dlq-watcher.message-consumer:
    build:
      context: ./dlq_watcher
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-develop}
    container_name: dlq-watcher.message-consumer
    restart: unless-stopped
    env_file:
      - ./dlq_watcher/.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  # --- Inventory Service Commands Consumer ---
  # Основной контейнер: гоняет миграции (RUN_MIGRATIONS=true из .env) и слушает
  # inventory.commands. Relay и поллер автоистечения - отдельные контейнеры той
  # же сборки (миграции у них выключены, чтобы не гонять alembic наперегонки).
  inventory-service.message-consumer:
    build:
      context: ./inventory_service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-develop}
    container_name: inventory-service.message-consumer
    restart: unless-stopped
    env_file:
      - ./inventory_service/.env
    environment:
      DATABASE_HOST: inventory-service.postgres
      DATABASE_PORT: 5432
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    command: ["python", "-m", "app.entrypoints.messaging.consumer"]
    depends_on:
      inventory-service.postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # --- Inventory Service Outbox Relay (outbox -> orders.events) ---
  inventory-service.message-producer:
    build:
      context: ./inventory_service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-develop}
    container_name: inventory-service.message-producer
    restart: unless-stopped
    env_file:
      - ./inventory_service/.env
    environment:
      DATABASE_HOST: inventory-service.postgres
      DATABASE_PORT: 5432
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # миграции гоняет только консюмер - без гонки нескольких alembic
      RUN_MIGRATIONS: "false"
    command: ["python", "-m", "app.entrypoints.messaging.relay"]
    depends_on:
      inventory-service.postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # --- Inventory Service Reservation Expiry Poller (TTL) ---
  inventory-service.background-worker:
    build:
      context: ./inventory_service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-develop}
    container_name: inventory-service.background-worker
    restart: unless-stopped
    env_file:
      - ./inventory_service/.env
    environment:
      DATABASE_HOST: inventory-service.postgres
      DATABASE_PORT: 5432
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      RUN_MIGRATIONS: "false"
    command: ["python", "-m", "app.entrypoints.messaging.expiry"]
    depends_on:
      inventory-service.postgres:
        condition: service_healthy

secrets:
  auth_jwt_private_key:
    file: ./auth_service/secrets/private/access-token.pem

configs:
  auth_jwt_public_key:
    file: ./auth_service/secrets/access-token-public.pem

