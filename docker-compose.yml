services:

  # --- PostgreSQL for Payment Service---
  payment-service-db:
    image: postgres:17-bookworm
    container_name: payment-service-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PAYMENT_DB_USER}
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD}
      POSTGRES_DB: ${PAYMENT_DB_NAME}
    ports:
      - "${PAYMENT_DB_PORT}:5432"
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENT_DB_USER} -d ${PAYMENT_DB_NAME}"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5

  # --- PostgreSQL for Analytics Service---
  analytics-service-db:
    image: postgres:17-bookworm
    container_name: analytics-service-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ANALYTICS_DB_USER}
      POSTGRES_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      POSTGRES_DB: ${ANALYTICS_DB_NAME}
    ports:
      - "${ANALYTICS_DB_PORT}:5432"
    volumes:
      - analytics_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ANALYTICS_DB_USER} -d ${ANALYTICS_DB_NAME}"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-bookworm
    container_name: payflow-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 5

  # --- Kafka (KRaft mode) ---
  kafka:
    image: apache/kafka:3.9.0
    container_name: payflow-kafka
    restart: unless-stopped
    environment:
      # KRaft
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Listeners
      # PLAINTEXT   для сервисов внутри docker network
      # CONTROLLER  для внутреннего KRaft-протокола
      # EXTERNAL    для доступа с хоста (localhost:9092)
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Топики
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # Storage
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "PayFlowLocalDevCluster01"
    ports:
      - "9092:9092"     # для доступа с хоста
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:29092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  # --- Payment Service ---
  payment-service:
    build:
      context: ./payment_service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-develop}
    container_name: payflow-payment-service
    restart: unless-stopped
    env_file:
      - ./payment_service/.env
    environment:
      # переопределяем хосты - внутри docker network используем имена сервисов
      DATABASE_HOST: payment-service-db
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PAYMENT_PROVIDER_URL: http://payment-provider-mock:8010
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/ready')"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    depends_on:
      payment-service-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      payment-provider-mock:
        condition: service_healthy

  # --- Payment Provider Mock ---
  payment-provider-mock:
    build:
      context: ./payment_provider_mock
      dockerfile: Dockerfile
    container_name: payflow-payment-provider-mock
    restart: unless-stopped
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 3

  # --- Payment Outbox Relay Worker ---
  payment-outbox-relay:
    build:
      context: ./payment_service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-develop}
    container_name: payflow-payment-outbox-relay
    restart: unless-stopped
    env_file:
      - ./payment_service/.env
    environment:
      DATABASE_HOST: payment-service-db
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PAYMENT_PROVIDER_URL: http://payment-provider-mock:8010
    command: ["python", "-m", "app.worker"]
    depends_on:
      payment-service-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # --- Analytics Service ---
  analytics-service:
    build:
      context: ./analytics_service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-develop}
    container_name: payflow-analytics-service
    restart: unless-stopped
    env_file:
      - ./analytics_service/.env
    environment:
      # переопределяем хосты - внутри docker network используем имена сервисов
      DATABASE_HOST: analytics-service-db
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health/ready')"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    depends_on:
      analytics-service-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  payment_db_data:
  analytics_db_data:
  redis_data:
  kafka_data:
